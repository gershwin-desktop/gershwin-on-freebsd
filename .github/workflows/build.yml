name: Build Gershwin-on-FreeBSD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: FreeBSD x86_64
            runner: ubuntu-latest
            arch: amd64
            archname: amd64
            artifact_name: gershwin-on-freebsd-15-amd64
          - label: FreeBSD aarch64
            runner: ubuntu-24.04-arm
            arch: aarch64
            archname: aarch64
            artifact_name: gershwin-on-freebsd-15-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install qemu-system-aarch64
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm

      - name: Build ISO inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          usesh: true
          sync: rsync
          copyback: true
          cpu: 4
          mem: 8192
          prepare: |
            pkg install -y git-lite zsync wget bash zip librsvg2 ca_root_nss transmission-cli fdupes
          run: |
            set -e
            kldload zfs || true
            kldload tmpfs || true
            kldload nullfs || true
            kldload geom_uzip || true
            mkdir -p /usr/local/freebsd-build/uzip /usr/local/freebsd-build/cdroot
            mount -t tmpfs tmpfs /usr/local/freebsd-build/uzip || true
            mount -t tmpfs tmpfs /usr/local/freebsd-build/cdroot || true
            export TARGET_VERSION=15
            export TARGET_ARCH=${{ matrix.arch }}
            /bin/sh ./build.sh
            ls -lh /usr/local/freebsd-build/iso/
            mkdir -p artifacts/FreeBSD/15/${{ matrix.archname }}
            cp /usr/local/freebsd-build/iso/*.iso* artifacts/FreeBSD/15/${{ matrix.archname }}/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/FreeBSD/15/${{ matrix.archname }}
          if-no-files-found: error

  publish:
    name: Publish continuous release
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to continuous release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          shopt -s nullglob globstar
          assets=(dist/**/*.iso dist/**/*.iso.sha256)
          ls -lh "${assets[@]}"

          TAG="continuous"
          NOTES="GitHub Actions build log: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          gh release delete "$TAG" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Continuous build" \
            --notes "$NOTES" \
            --prerelease \
            "${assets[@]}"
