# Tier 1 — live-ISO-only loader settings.
#
# This file lives ONLY on the cd9660 boot layer (staged into CD_ROOT by
# build.sh's prepare_boot_env). It is never part of the uzip, so it never
# reaches an installed system — which is correct: everything here is
# pivot machinery or LiveCD-specific tuning that an installed UFS root
# must not inherit.
#
# Everything that SHOULD apply to both the live ISO and installed systems
# lives in loader.conf.d/gershwin.conf instead (the "Tier 2" drop-in),
# which is baked into the uzip and read on installed systems via the
# base-default loader_conf_dirs="/boot/loader.conf.d".

# Modules used by /boot/init_script for the unionfs pivot.
geom_uzip_load="YES"
unionfs_load="YES"
tmpfs_load="YES" # Must not do this on FreeBSD 13 (build.sh comments it out)

# Boot the ISO from a Ventoy USB.
geom_ventoy_load="YES"

# init runs the pivot script, which sets up the unionfs root and then
# sets init_chroot=/sysroot so init chroots there and continues a normal
# multi-user boot.
init_shell="/rescue/sh"
init_script="/boot/init_script"

# Messages about which partition the kernel can see.
kern.geom.label.debug="1"

# Needed because mounting of an IPMI CD-ROM is sometimes slow.
vfs.mountroot.timeout="180"

# Initial root = cd9660 from the live media. The installer writes its own
# ufs: mountfrom into the installed system's loader.conf.
vfs.root.mountfrom="cd9660:/dev/iso9660/FREEBSD"

# Tune ARC for lower memory usage during the LiveCD session. Deliberately
# Tier 1 — a 330M kmem cap would hurt an installed system.
vm.kmem_size="330M"
vm.kmem_size_max="330M"

# Read the Tier-2 drop-in (quiet boot + hardware quirks, shared with
# installed systems).
loader_conf_dirs="/boot/loader.conf.d"
