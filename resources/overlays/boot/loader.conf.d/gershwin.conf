# Tier 2 — loader settings shared by the live ISO AND installed systems.
#
# This drop-in is baked into the uzip (build.sh's configure_system writes
# it into RELEASE_DIR/boot/loader.conf.d/), so the installer's dd of the
# uzip carries it onto installed disks, where the base-default
# loader_conf_dirs="/boot/loader.conf.d" reads it automatically. It is
# also staged onto the cd9660 boot layer so the live loader reads it too.
#
# Everything that must stay live-ISO-only (pivot machinery, the LiveCD
# kmem cap, the cd9660 root mountfrom) lives in ../loader.conf instead.
#
# The quiet-boot block below (native resolution + boot_mute + the
# kern.vt.color.* scheme + splash) is derived from probonopd's helloSystem
# loader.mute.d; its license follows.
